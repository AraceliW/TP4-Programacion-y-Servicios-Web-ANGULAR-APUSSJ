<!-- Icono del carrito -->
<div class="container-fluid text-center py-3">
    <div class="m-3">
        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#carritoModal">
            <i class="bi bi-cart"></i>
            <span class="badge bg-light text-dark mx-1">{{ getCantidadProductos() }}</span>
        </button>
    </div>
</div>

<div class="container-fluid p-5 bg-primary-subtle">
    <h2 class="text-center mb-4">Productos Destacados</h2>
    <div class="row gy-4">
      <!-- Recorremos el array de productos usando *ngFor -->
        <div class="col-12 col-md-6 col-lg-3" *ngFor="let item of producto">
            <div class="card border-dark-subtle border-3 rounded-3 h-100">
                <img [src]="item.img" class="card-img-top" alt="{{item.nombre}}">
                <div class="card-body d-flex flex-column justify-content-between">
                    <h5 class="card-title fs-5">{{ item.nombre }}</h5>
                    <p class="card-text fs-5">${{ item.precio | number }}</p>
                    <button class="btn btn-danger w-100" (click)="agregarAlCarrito(item)">Agregar al carrito</button>
                </div>
            </div>
        </div>
    </div>
</div>


    <!-- Modal del carrito -->
<div class="modal fade" id="carritoModal" tabindex="-1" aria-labelledby="carritoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="carritoModalLabel">Carrito de Compras</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div *ngIf="carrito.length === 0">
                        <div *ngIf="compraFinalizada" class="text-center">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 2rem;"></i>
                            <h5 class="mt-3">¡Gracias por tu compra!</h5>
                            <p class="text-muted">Tu pedido ha sido procesado correctamente.</p>
                        </div>
                        <p *ngIf="!compraFinalizada">Tu carrito está vacío</p>
                    </div>
                    <div *ngIf="carrito.length > 0">
                        <div *ngFor="let item of carrito" class="mb-3">
                            <div class="d-flex align-items-center">
                                <img [src]="item.img" class="img-thumbnail me-3" style="width: 60px; height: 60px; object-fit: cover;" alt="{{item.nombre}}">
                                <div class="flex-grow-1">
                                    <h6 class="mb-0">{{ item.nombre }}</h6>
                                    <small class="text-muted">${{ item.precio | number }}</small>
                                </div>
                            </div>
                        </div>                        
                        <div class="d-flex justify-content-between">
                            <h5>Total:</h5>
                            <h5>${{ total | number }}</h5>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="cerrarModal()">Cerrar</button>
                    <button type="button" class="btn btn-danger" [disabled]="carrito.length === 0" (click)="finalizarCompra()" *ngIf="!compraFinalizada">Finalizar Compra</button>
                </div>
            </div>
        </div>
</div>
