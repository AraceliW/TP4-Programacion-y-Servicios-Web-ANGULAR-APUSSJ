<div class="container mt-4 pb-5 contenedor">
  <div class="row justify-content-center">
    
    <div class="col-12 col-md-8 col-lg-6">
      
      <h1 class="text-center mb-4">Juego de memoria</h1>

      <div class="row row-cols-4 g-3 mb-5">
        @for(carta of cartas; track carta.id) {
          <div class="col">
            <div class="carta card d-flex justify-content-center align-items-center h-100" 
                 (click)="voltearCarta(carta)"
                 [class]="carta.volteada || carta.emparejada ? 'bg-success' : ''"
                 [style.cursor]="jugable ? 'pointer' : 'not-allowed'"
            >
              {{carta.volteada || carta.emparejada ? carta.imagen : '?'}}
            </div>
          </div>
        }
      </div>

    <div class="row g-2">
        <button (click)="iniciarJuego()" class="p-2 btn btn-success">MEZCLAR</button>
        <button (click)="reiniciarJuego()" class="p-2 btn btn-warning">REINICIAR</button>
        <button (click)="activarSeleccion()" class="p-2 btn btn-info"> {{intentos}}| {{jugable ? 'ELIGIENDO CARTAS...': 'SELECCIONAR 2 CARTAS'}}</button>
    </div>
</div>
